<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <!-- Meta tags específicos para iPadOS y PWA -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="DJ Emmy">
    <meta name="theme-color" content="#8b5cf6">
    
    <title>DJ Emmy - Reproductor Infantil</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Link al manifest dinámico (se llenará con JS) -->
    <link id="manifest-link" rel="manifest" href="">
    
    <!-- Iconos de la app (Se generarán dinámicamente con JS para máxima compatibilidad iOS) -->
    <link id="apple-icon" rel="apple-touch-icon" href="">
    <link id="favicon" rel="icon" type="image/png" href="">
    
    <script>
        // Generador dinámico de Ícono en alta calidad (Soluciona problemas de SVG en iPad)
        (function() {
            const canvas = document.createElement('canvas');
            canvas.width = 512;
            canvas.height = 512;
            const ctx = canvas.getContext('2d');
            
            // Fondo
            const gradient = ctx.createLinearGradient(0, 0, 512, 512);
            gradient.addColorStop(0, '#8b5cf6'); // Violeta
            gradient.addColorStop(1, '#ec4899'); // Rosa
            ctx.fillStyle = gradient;
            ctx.beginPath();
            ctx.roundRect(0, 0, 512, 512, 100);
            ctx.fill();

            // Sombra del emoji
            ctx.fillStyle = 'rgba(0,0,0,0.2)';
            ctx.beginPath();
            ctx.ellipse(256, 380, 120, 30, 0, 0, Math.PI * 2);
            ctx.fill();

            // Emoji 🎧
            ctx.font = '240px Arial';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText('🎧', 256, 256);

            const iconUrl = canvas.toDataURL('image/png');
            document.getElementById('apple-icon').href = iconUrl;
            document.getElementById('favicon').href = iconUrl;
            window.appIconPNG = iconUrl; // Guardar para el manifest
        })();
    </script>

    <style>
        /* Evitar el "pull-to-refresh" y scroll elástico de iOS en toda la página */
        body {
            overscroll-behavior-y: none;
            -webkit-overflow-scrolling: touch;
        }

        /* Ocultar scrollbars globalmente pero permitir scroll */
        ::-webkit-scrollbar {
            width: 0px;
            height: 0px;
            background: transparent;
        }

        /* Estilos de las pestañas */
        .tab-activa {
            background-color: rgba(255, 255, 255, 0.95);
            color: #7c3aed;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            transform: scale(1.02);
            border-radius: 9999px;
            z-index: 10;
        }
        .tab-inactiva {
            background-color: transparent;
            color: white;
            border-radius: 9999px;
            z-index: 1;
        }
        .tab-inactiva:hover {
            background-color: rgba(255, 255, 255, 0.1);
        }

        /* Animaciones Memorama */
        .perspective-1000 { perspective: 1000px; }
        .transform-style-3d { transform-style: preserve-3d; }
        .backface-hidden { backface-visibility: hidden; -webkit-backface-visibility: hidden; }
        .rotate-y-180 { transform: rotateY(180deg); }
        .tarjeta-memorama { transition: transform 0.6s cubic-bezier(0.4, 0.2, 0.2, 1), opacity 0.5s ease; }

        /* Animación Confeti y Pila */
        @keyframes pop-in {
            0% { transform: scale(0); }
            80% { transform: scale(1.2); }
            100% { transform: scale(1); }
        }
        .anim-pop { animation: pop-in 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }

        /* Efecto al tocar botones en iPad */
        article:active {
            transform: scale(0.95);
            transition: transform 0.1s;
        }
    </style>
</head>
<body class="bg-gradient-to-br from-violet-500 via-fuchsia-500 to-pink-500 min-h-screen max-h-screen flex flex-col font-sans select-none overflow-hidden">

    <!-- Encabezado Fijo -->
    <header class="pt-6 md:pt-8 pb-2 px-4 md:px-6 lg:px-8 flex justify-between items-center shrink-0">
        <h1 class="text-2xl md:text-4xl font-extrabold text-white tracking-tight drop-shadow-md flex items-center gap-2">
            <span class="text-3xl md:text-5xl">🎧</span> DJ Emmy
        </h1>
        
        <div class="flex gap-2 md:gap-3">
            <!-- Botón para Parar Todo -->
            <button onclick="pararTodo()" id="btn-parar" class="bg-red-500/80 hover:bg-red-600 text-white w-10 h-10 md:w-12 md:h-12 rounded-full backdrop-blur-md shadow-lg flex items-center justify-center transition-all active:scale-90 border border-white/30">
                <span class="text-lg md:text-xl" style="line-height: 1;">⏹️</span>
            </button>

            <!-- Botón para Limpiar Caché y Actualizar -->
            <button onclick="borrarCacheYRecargar()" id="btn-actualizar" class="bg-white/20 hover:bg-white/30 text-white w-10 h-10 md:w-12 md:h-12 rounded-full backdrop-blur-md shadow-lg flex items-center justify-center transition-all active:scale-90 border border-white/30">
                <span id="icono-actualizar" class="text-lg md:text-xl">🔄</span>
            </button>
            
            <!-- Botón para Forzar Descarga Manual -->
            <button onclick="iniciarDescargaOffline()" id="btn-descarga-manual" class="bg-white/20 hover:bg-white/30 text-white w-10 h-10 md:w-12 md:h-12 rounded-full backdrop-blur-md shadow-lg flex items-center justify-center transition-all active:scale-90 border border-white/30">
                <span class="text-lg md:text-xl">☁️</span>
            </button>
        </div>
    </header>

    <!-- Controles de Navegación (Pestañas) en el Centro - CORREGIDO -->
    <nav class="w-full px-4 md:px-6 lg:px-8 flex justify-center shrink-0 mb-3 md:mb-5">
        <div class="w-full max-w-2xl flex bg-black/20 p-1.5 rounded-full gap-1 backdrop-blur-md border border-white/20 shadow-inner">
            <button id="btn-musica" onclick="cambiarSeccion('musica')" class="flex-1 py-2.5 text-[15px] md:text-lg font-bold transition-all tab-activa flex items-center justify-center gap-1 md:gap-2">
                🎵 Música
            </button>
            <button id="btn-memorama" onclick="cambiarSeccion('memorama')" class="flex-1 py-2.5 text-[15px] md:text-lg font-bold transition-all tab-inactiva flex items-center justify-center gap-1 md:gap-2">
                🍎 Memorama
            </button>
            <button id="btn-videos" onclick="cambiarSeccion('videos')" class="flex-1 py-2.5 text-[15px] md:text-lg font-bold transition-all tab-inactiva flex items-center justify-center gap-1 md:gap-2">
                🎬 Videos
            </button>
        </div>
    </nav>

    <!-- Área de Contenido Principal -->
    <main class="flex-1 flex flex-col min-h-0 px-4 md:px-6 pt-1 pb-2 lg:px-8">
        
        <!-- Contenedor Música -->
        <div id="seccion-musica" class="flex-1 overflow-y-auto min-h-0 pr-2 block">
            <div id="grid-musica" class="grid grid-cols-3 md:grid-cols-4 lg:grid-cols-5 xl:grid-cols-6 gap-3 md:gap-6 pb-10">
                <!-- Botones inyectados vía JS -->
            </div>
        </div>

        <!-- Contenedor Memorama -->
        <div id="seccion-memorama" class="flex-1 min-h-0 hidden flex-col items-center justify-center pb-2 md:pb-4 relative w-full overflow-hidden">
            <div class="w-full flex justify-between items-center mb-2 md:mb-4 px-2 md:px-4 shrink-0 max-w-7xl">
                <h2 class="text-xl md:text-3xl font-bold text-white drop-shadow-md">Encuentra las parejas</h2>
            </div>
            
            <div class="flex flex-col w-full max-w-7xl justify-center items-center gap-3 md:gap-5 px-2 md:px-4 flex-1 min-h-0">
                <div id="grid-memorama" class="grid grid-cols-4 lg:grid-cols-8 gap-2 md:gap-4 w-full perspective-1000 shrink-0">
                    <!-- Tarjetas inyectadas vía JS -->
                </div>

                <div class="w-full bg-black/20 backdrop-blur-md border-2 border-white/20 rounded-2xl flex items-center p-2 md:p-3 gap-3 shadow-inner overflow-x-auto min-h-[4rem] md:min-h-[5.5rem] shrink-0">
                    <span class="text-white/70 font-bold text-sm md:text-base uppercase tracking-widest pl-2 pr-2">Pares</span>
                    <div id="stack-parejas" class="flex flex-row gap-2 md:gap-3 w-full justify-start items-center">
                        <!-- Frutas apiladas por JS -->
                    </div>
                </div>
            </div>

            <div id="mensaje-victoria" class="hidden absolute inset-0 flex-col items-center justify-center z-50 pointer-events-none transition-opacity duration-1000 opacity-0">
                <span class="text-8xl md:text-[9rem] mb-4 animate-bounce drop-shadow-[0_10px_10px_rgba(0,0,0,0.5)]">🏆</span>
                <h2 class="text-6xl md:text-8xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-yellow-300 to-yellow-500 drop-shadow-[0_5px_5px_rgba(0,0,0,0.8)]">¡Ganaste!</h2>
            </div>
        </div>

        <!-- Contenedor Videos -->
        <div id="seccion-videos" class="flex-1 hidden flex-col h-full min-h-0 pb-6 relative">
            <div id="contenedor-reproductor" class="flex-1 w-full bg-black rounded-3xl overflow-hidden shadow-2xl relative flex items-center justify-center min-h-[30vh]">
                <div id="video-placeholder" class="absolute inset-0 flex flex-col items-center justify-center text-white/50">
                    <span class="text-6xl md:text-7xl mb-4">📺</span>
                    <p class="text-lg md:text-xl font-medium">Toca un video abajo para reproducir</p>
                </div>

                <div id="indicador-carga-video" class="hidden absolute inset-0 bg-black/80 flex-col items-center justify-center z-10 backdrop-blur-sm">
                    <div class="w-12 h-12 md:w-16 md:h-16 border-8 border-pink-500 border-t-transparent rounded-full animate-spin mb-4"></div>
                    <p class="text-white font-bold text-lg md:text-xl drop-shadow-md">Cargando video...</p>
                </div>

                <video id="reproductor-video" class="w-full h-full object-contain hidden" controls playsinline preload="none">
                    Tu navegador no soporta videos HTML5.
                </video>
            </div>

            <div class="mt-4 h-28 md:h-40 w-full shrink-0">
                <div class="h-full w-full overflow-x-auto overflow-y-hidden pb-2 snap-x snap-mandatory">
                    <div id="lista-videos" class="flex gap-3 md:gap-4 px-2 h-full items-center">
                        <!-- Tarjetas de video inyectadas vía JS -->
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Modal PWA y otros elementos -->
    <div id="modal-descarga" class="hidden fixed inset-0 z-50 bg-black/60 backdrop-blur-sm flex-col justify-center items-center p-4">
        <div class="bg-white rounded-3xl p-6 md:p-8 w-full max-w-md shadow-2xl text-center">
            <h3 class="text-2xl font-bold text-gray-800 mb-2">Preparando iPad 🚀</h3>
            <p id="texto-progreso-descarga" class="text-gray-600 font-medium mb-6">Analizando archivos...</p>
            
            <div class="w-full bg-gray-200 rounded-full h-6 md:h-8 mb-4 overflow-hidden shadow-inner border border-gray-300">
                <div id="barra-progreso" class="bg-gradient-to-r from-pink-500 to-violet-500 h-full rounded-full transition-all duration-300 w-0 flex items-center justify-end pr-2">
                    <span id="porcentaje-texto" class="text-white text-xs md:text-sm font-bold shadow-sm">0%</span>
                </div>
            </div>
            
            <button id="btn-cerrar-modal" onclick="document.getElementById('modal-descarga').classList.replace('flex', 'hidden')" class="hidden mt-4 bg-gray-100 hover:bg-gray-200 text-gray-800 font-bold py-3 px-6 rounded-xl w-full transition-colors">
                Cerrar
            </button>
        </div>
    </div>

    <div id="pwa-prompt" class="hidden fixed bottom-6 left-1/2 transform -translate-x-1/2 bg-white/95 backdrop-blur-md px-6 py-4 rounded-3xl shadow-2xl flex-col items-center text-center border-2 border-violet-200 animate-bounce w-[90%] max-w-sm z-50">
        <span class="text-3xl mb-2">📲</span>
        <p class="text-gray-800 font-bold mb-1">¡Instala DJ Emmy!</p>
        <p class="text-sm text-gray-600 leading-tight">Toca el botón <b>Compartir</b> <br> y luego <b>"Agregar a Inicio"</b></p>
    </div>

    <audio id="motor-audio" playsinline></audio>

    <script>
        let musica = []; 
        let videosDatos = []; 
        let urlsParaCachear = []; 

        const frutasMemorama = ['🍎', '🍌', '🍇', '🍉', '🍓', '🍍', '🥝', '🍒', '🥭', '🥥', '🥑', '🍋'];
        let cartasJuego = [];
        let cartasVolteadas = [];
        let parejasEncontradas = 0;
        let memoramaBloqueado = false;

        const AudioContext = window.AudioContext || window.webkitAudioContext;
        let audioCtx;

        const initAudio = () => {
            if (!audioCtx) audioCtx = new AudioContext();
            if (audioCtx.state === 'suspended') audioCtx.resume();
        };

        const playTone = (freq, type, duration, vol=0.1) => {
            initAudio();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = type;
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            gain.gain.setValueAtTime(vol, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + duration);
        };

        const sonidoFlip = () => playTone(300, 'triangle', 0.05, 0.02);
        const sonidoExito = () => {
            playTone(523.25, 'sine', 0.1, 0.1); 
            setTimeout(() => playTone(659.25, 'sine', 0.2, 0.1), 100); 
        };
        const sonidoError = () => {
            playTone(200, 'sawtooth', 0.1, 0.05);
            setTimeout(() => playTone(150, 'sawtooth', 0.2, 0.05), 100);
        };
        const sonidoVictoria = () => {
            [523.25, 659.25, 783.99, 1046.50].forEach((f, i) => setTimeout(() => playTone(f, 'sine', 0.3, 0.1), i * 150));
        };

        const lanzarConfeti = () => {
            const colores = ['#fce18a', '#ff726d', '#b48def', '#f4306d', '#42c062', '#3b82f6', '#fbbf24'];
            for (let i = 0; i < 80; i++) {
                const confeti = document.createElement('div');
                confeti.className = 'absolute w-3 h-3 md:w-4 md:h-4 rounded-sm z-50 pointer-events-none';
                confeti.style.backgroundColor = colores[Math.floor(Math.random() * colores.length)];
                confeti.style.left = Math.random() * 100 + 'vw';
                confeti.style.top = '-20px';
                document.body.appendChild(confeti);
                
                const duracion = Math.random() * 3 + 2;
                const delay = Math.random() * 0.2;
                
                confeti.animate([
                    { transform: `translate3d(0,0,0) rotate(0deg)`, opacity: 1 },
                    { transform: `translate3d(${Math.random()*300 - 150}px, 100vh, 0) rotate(${Math.random()*720}deg)`, opacity: 0 }
                ], {
                    duration: duracion * 1000,
                    delay: delay * 1000,
                    easing: 'cubic-bezier(.37,0,.63,1)',
                    fill: 'forwards'
                });
                
                setTimeout(() => confeti.remove(), (duracion + delay) * 1000);
            }
        };

        const contenedorMusica = document.getElementById('grid-musica');
        const listaVideosUI = document.getElementById('lista-videos');
        const reproductorVideo = document.getElementById('reproductor-video');
        const indicadorCargaVideo = document.getElementById('indicador-carga-video');
        const motorAudio = document.getElementById('motor-audio');
        
        const pararTodo = () => {
            motorAudio.pause();
            motorAudio.currentTime = 0;
            reproductorVideo.pause();
        };

        const reproducirMusica = (track) => {
            pararTodo();
            motorAudio.src = `audio/${track.archivo}.mp3`;
            motorAudio.play().catch(e => console.log("Espera interacción del usuario"));
        };

        const reproducirVideo = (track) => {
            pararTodo();
            document.getElementById('video-placeholder').classList.add('hidden');
            reproductorVideo.classList.add('hidden');
            indicadorCargaVideo.classList.remove('hidden');
            indicadorCargaVideo.classList.add('flex');

            reproductorVideo.src = `vid/${track.archivo}.mp4`;
            reproductorVideo.load();
            reproductorVideo.play().then(() => {
                indicadorCargaVideo.classList.remove('flex');
                indicadorCargaVideo.classList.add('hidden');
                reproductorVideo.classList.remove('hidden');
            }).catch(e => {
                indicadorCargaVideo.classList.remove('flex');
                indicadorCargaVideo.classList.add('hidden');
                reproductorVideo.classList.remove('hidden'); 
            });
        };

        const crearBotones = (datos, contenedor) => {
            contenedor.innerHTML = '';
            datos.forEach(track => {
                const articulo = document.createElement('article');
                articulo.className = `${track.color} rounded-3xl p-3 md:p-4 shadow-[0_8px_0_rgba(0,0,0,0.2)] md:shadow-[0_12px_0_rgba(0,0,0,0.2)] hover:shadow-[0_4px_0_rgba(0,0,0,0.2)] hover:translate-y-1 md:hover:translate-y-2 cursor-pointer flex flex-col items-center justify-center text-center border-4 border-white/20 transition-all group`;
                articulo.innerHTML = `
                    <span class="text-5xl md:text-6xl mb-2 drop-shadow-md group-hover:scale-110 transition-transform">${track.emoji}</span>
                    <h3 class="text-white font-extrabold text-sm md:text-lg leading-tight drop-shadow-md">${track.titulo}</h3>
                    <p class="text-white/80 font-bold text-xs md:text-sm mt-1 uppercase tracking-wider">${track.interprete}</p>
                `;
                articulo.addEventListener('click', () => reproducirMusica(track));
                contenedor.appendChild(articulo);
            });
        };

        const crearBotonesVideos = () => {
            listaVideosUI.innerHTML = '';
            videosDatos.forEach(track => {
                const articulo = document.createElement('article');
                articulo.className = `snap-center shrink-0 w-36 md:w-56 h-full bg-gray-800 rounded-2xl shadow-xl border-4 border-white/10 overflow-hidden cursor-pointer group relative`;
                
                articulo.innerHTML = `
                    <div class="absolute inset-0 bg-cover bg-center transition-transform duration-500 group-hover:scale-110" style="background-image: url('img/cover-vid-${track.archivo}.webp'); background-color: #4c1d95;">
                        <div class="absolute inset-0 bg-gradient-to-t from-black via-black/40 to-transparent"></div>
                    </div>
                    <div class="absolute inset-0 flex flex-col items-center justify-end p-2 md:p-3 text-center z-10">
                        <h3 class="text-white font-bold text-xs md:text-sm leading-tight drop-shadow-md truncate w-full">${track.titulo}</h3>
                    </div>
                `;
                articulo.addEventListener('click', () => reproducirVideo(track));
                listaVideosUI.appendChild(articulo);
            });
        };

        const iniciarMemorama = () => {
            const grid = document.getElementById('grid-memorama');
            const stack = document.getElementById('stack-parejas');
            const mensajeVictoria = document.getElementById('mensaje-victoria');
            
            grid.innerHTML = '';
            stack.innerHTML = '';
            mensajeVictoria.classList.add('hidden');
            mensajeVictoria.classList.remove('flex');
            mensajeVictoria.classList.replace('opacity-100', 'opacity-0');
            cartasVolteadas = [];
            parejasEncontradas = 0;
            memoramaBloqueado = false;
            
            cartasJuego = [...frutasMemorama, ...frutasMemorama]
                .sort(() => Math.random() - 0.5)
                .map((fruta, index) => ({ id: index, fruta, volteada: false, encontrada: false }));

            cartasJuego.forEach((carta, index) => {
                const cardEl = document.createElement('div');
                cardEl.className = 'tarjeta-memorama relative aspect-square cursor-pointer transform-style-3d';
                
                cardEl.innerHTML = `
                    <div class="absolute inset-0 bg-white/20 backdrop-blur-md border-2 md:border-4 border-white/30 rounded-2xl flex items-center justify-center backface-hidden shadow-lg">
                        <span class="text-3xl md:text-5xl opacity-80">❓</span>
                    </div>
                    <div class="absolute inset-0 bg-white rounded-2xl flex items-center justify-center backface-hidden rotate-y-180 shadow-lg border-2 md:border-4 border-pink-400">
                        <span class="text-4xl md:text-[4rem] drop-shadow-sm pointer-events-none">${carta.fruta}</span>
                    </div>
                `;

                cardEl.addEventListener('click', () => voltearCarta(cardEl, index));
                grid.appendChild(cardEl);
            });
        };

        const voltearCarta = (cardEl, index) => {
            if (memoramaBloqueado || cartasJuego[index].volteada || cartasJuego[index].encontrada) return;

            pararTodo(); 
            initAudio(); 
            sonidoFlip();
            
            cartasJuego[index].volteada = true;
            cardEl.classList.add('rotate-y-180');
            cartasVolteadas.push({ cardEl, index });

            if (cartasVolteadas.length === 2) {
                verificarPareja();
            }
        };

        const verificarPareja = () => {
            memoramaBloqueado = true;
            const [carta1, carta2] = cartasVolteadas;
            const fruta = cartasJuego[carta1.index].fruta;

            if (fruta === cartasJuego[carta2.index].fruta) {
                cartasJuego[carta1.index].encontrada = true;
                cartasJuego[carta2.index].encontrada = true;
                parejasEncontradas++;
                
                sonidoExito();
                
                setTimeout(() => {
                    carta1.cardEl.classList.add('scale-0', 'opacity-0');
                    carta2.cardEl.classList.add('scale-0', 'opacity-0');
                    
                    const pilaEl = document.getElementById('stack-parejas');
                    const frutaStack = document.createElement('div');
                    frutaStack.className = 'bg-white/30 border-2 border-white/50 rounded-xl w-8 h-8 md:w-12 md:h-12 flex items-center justify-center text-xl md:text-3xl anim-pop shadow-md shrink-0';
                    frutaStack.innerText = fruta;
                    pilaEl.appendChild(frutaStack);

                    memoramaBloqueado = false;
                    cartasVolteadas = [];
                    
                    if (parejasEncontradas === frutasMemorama.length) {
                        const victoriaEl = document.getElementById('mensaje-victoria');
                        victoriaEl.classList.remove('hidden');
                        victoriaEl.classList.add('flex');
                        
                        setTimeout(() => {
                            victoriaEl.classList.replace('opacity-0', 'opacity-100');
                        }, 50);

                        sonidoVictoria();
                        lanzarConfeti();

                        setTimeout(() => {
                            victoriaEl.classList.replace('opacity-100', 'opacity-0');
                            setTimeout(() => {
                                iniciarMemorama(); 
                            }, 1000); 
                        }, 5500); 
                    }
                }, 600);
            } else {
                setTimeout(() => {
                    sonidoError();
                    carta1.cardEl.classList.remove('rotate-y-180');
                    carta2.cardEl.classList.remove('rotate-y-180');
                    cartasJuego[carta1.index].volteada = false;
                    cartasJuego[carta2.index].volteada = false;
                    memoramaBloqueado = false;
                    cartasVolteadas = [];
                }, 1000);
            }
        };

        const cambiarSeccion = (seccion) => {
            pararTodo();
            const seccionesConfig = [
                { id: 'musica', display: 'block' },
                { id: 'memorama', display: 'flex' },
                { id: 'videos', display: 'flex' }
            ];
            
            seccionesConfig.forEach(sec => {
                const cont = document.getElementById(`seccion-${sec.id}`);
                const btn = document.getElementById(`btn-${sec.id}`);
                
                if (sec.id === seccion) {
                    cont.classList.remove('hidden');
                    if (sec.display === 'flex') cont.classList.add('flex');
                    else cont.classList.add('block');
                    btn.className = "flex-1 py-2.5 text-[15px] md:text-lg font-bold transition-all tab-activa flex items-center justify-center gap-1 md:gap-2";
                } else {
                    cont.classList.add('hidden');
                    if (sec.display === 'flex') cont.classList.remove('flex');
                    else cont.classList.remove('block');
                    btn.className = "flex-1 py-2.5 text-[15px] md:text-lg font-bold transition-all tab-inactiva flex items-center justify-center gap-1 md:gap-2";
                }
            });
        };

        const borrarCacheYRecargar = async () => {
            const iconoBtn = document.getElementById('icono-actualizar');
            iconoBtn.classList.add('animate-spin');
            
            try {
                if ('serviceWorker' in navigator) {
                    const registrations = await navigator.serviceWorker.getRegistrations();
                    for (let registration of registrations) {
                        await registration.unregister();
                    }
                }
                const cacheNames = await caches.keys();
                await Promise.all(cacheNames.map(name => caches.delete(name)));
                window.location.reload();
            } catch (error) {
                console.error("Error al limpiar caché:", error);
                window.location.reload(); 
            }
        };

        const CACHE_NAME = 'djemmy-cache-v17'; 
        
        const iniciarDescargaOffline = async () => {
            const modal = document.getElementById('modal-descarga');
            const barra = document.getElementById('barra-progreso');
            const textoPorcentaje = document.getElementById('porcentaje-texto');
            const textoProgreso = document.getElementById('texto-progreso-descarga');
            const btnCerrar = document.getElementById('btn-cerrar-modal');

            barra.style.width = '0%';
            textoPorcentaje.innerText = '0%';
            textoProgreso.innerText = "Calculando archivos...";
            btnCerrar.classList.add('hidden');
            modal.classList.remove('hidden');
            modal.classList.add('flex');

            try {
                const cache = await caches.open(CACHE_NAME);
                let completados = 0;
                const total = urlsParaCachear.length;

                for (let i = 0; i < total; i++) {
                    const url = urlsParaCachear[i];
                    textoProgreso.innerText = `Guardando: ${url.split('/').pop().substring(0,20)}...`;
                    
                    try {
                        const response = await fetch(url);
                        if (response.ok) {
                            await cache.put(url, response);
                        }
                    } catch (err) {
                        console.warn('No se pudo cachear:', url);
                    }

                    completados++;
                    const porcentaje = Math.round((completados / total) * 100);
                    barra.style.width = `${porcentaje}%`;
                    textoPorcentaje.innerText = `${porcentaje}%`;
                }

                textoProgreso.innerText = "¡Listo! iPad preparado para modo avión ✈️";
                btnCerrar.classList.remove('hidden');

            } catch (error) {
                console.error("Error en descarga manual", error);
                textoProgreso.innerText = "Error de conexión. Intenta de nuevo. ❌";
                btnCerrar.classList.remove('hidden');
            }
        };

        const inicializarApp = async () => {
            try {
                const [resAudios, resVids] = await Promise.all([
                    fetch('audios.json', { cache: 'no-cache' }),
                    fetch('vids.json', { cache: 'no-cache' })
                ]);
                
                if (!resAudios.ok) throw new Error('No se pudo cargar audios.json');
                if (!resVids.ok) throw new Error('No se pudo cargar vids.json');
                
                musica = await resAudios.json();
                videosDatos = await resVids.json();
            } catch (error) {
                console.error('Error cargando JSONs:', error);
                if(musica.length === 0) musica = [{ archivo: "error", titulo: "Audio Mockup 1", interprete: "Sistema", emoji: "🎶", color: "bg-red-500" }, { archivo: "error", titulo: "Audio Mockup 2", interprete: "Sistema", emoji: "🎸", color: "bg-blue-500" }];
                if(videosDatos.length === 0) videosDatos = [{ archivo: "error", titulo: "Video Mockup 1" }];
            }

            crearBotones(musica, contenedorMusica);
            iniciarMemorama();
            crearBotonesVideos();

            const baseHref = window.location.href.split('?')[0].replace(/index\.html$/, '');
            const makeAbsolute = (path) => new URL(path, baseHref).href;

            urlsParaCachear = [
                makeAbsolute('./'),
                makeAbsolute('index.html'),
                makeAbsolute('audios.json'), 
                makeAbsolute('vids.json')    
            ];
            
            musica.forEach(t => urlsParaCachear.push(makeAbsolute(`audio/${t.archivo}.mp3`)));
            videosDatos.forEach(t => {
                urlsParaCachear.push(makeAbsolute(`vid/${t.archivo}.mp4`));
                urlsParaCachear.push(makeAbsolute(`img/cover-vid-${t.archivo}.webp`));
            });

            const pwaManifest = {
                "name": "DJ Emmy Reproductor",
                "short_name": "DJ Emmy",
                "start_url": ".",
                "display": "standalone",
                "background_color": "#8b5cf6",
                "theme_color": "#8b5cf6",
                "description": "Botonera musical infantil",
                "icons": [{
                    "src": window.appIconPNG,
                    "sizes": "512x512",
                    "type": "image/png",
                    "purpose": "any maskable"
                }]
            };
            const blobManifest = new Blob([JSON.stringify(pwaManifest)], {type: 'application/json'});
            document.getElementById('manifest-link').href = URL.createObjectURL(blobManifest);

            const swCodigo = `
                const CACHE_NAME_SW = '${CACHE_NAME}'; 
                const urlsToCache = ${JSON.stringify(urlsParaCachear)};

                self.addEventListener('install', (event) => {
                    self.skipWaiting();
                    event.waitUntil(
                        caches.open(CACHE_NAME_SW).then((cache) => {
                            return Promise.all(
                                urlsToCache.map(url => {
                                    return cache.add(url).catch(err => console.warn('Ignorado en background:', url));
                                })
                            );
                        })
                    );
                });

                self.addEventListener('activate', (event) => {
                    event.waitUntil(
                        caches.keys().then((cacheNames) => {
                            return Promise.all(
                                cacheNames.map((cacheName) => {
                                    if (cacheName !== CACHE_NAME_SW) {
                                        return caches.delete(cacheName);
                                    }
                                })
                            );
                        }).then(() => self.clients.claim()) 
                    );
                });

                self.addEventListener('fetch', (event) => {
                    if (event.request.method !== 'GET') return;
                    
                    event.respondWith(
                        caches.match(event.request).then((cachedResponse) => {
                            if (cachedResponse) return cachedResponse; 
                            return fetch(event.request).then((networkResponse) => {
                                return caches.open(CACHE_NAME_SW).then((cache) => {
                                    cache.put(event.request, networkResponse.clone());
                                    return networkResponse;
                                });
                            });
                        }).catch(() => new Response('Contenido no disponible offline'))
                    );
                });
            `;
            const blobSW = new Blob([swCodigo], {type: 'application/javascript'});
            const urlSW = URL.createObjectURL(blobSW);

            if ('serviceWorker' in navigator) {
                navigator.serviceWorker.register(urlSW, { scope: './' }).catch(err => console.log('Error SW', err));
            }

            const esIos = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;
            const enModoStandalone = window.navigator.standalone === true || window.matchMedia('(display-mode: standalone)').matches;
            
            if (esIos && !enModoStandalone) {
                setTimeout(() => {
                    const prompt = document.getElementById('pwa-prompt');
                    prompt.classList.remove('hidden');
                    prompt.classList.add('flex');
                }, 2000);
            }
        };

        window.addEventListener('DOMContentLoaded', inicializarApp);
    </script>
</body>
