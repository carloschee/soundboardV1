    <!-- Link al manifest dinámico (se llenará con JS) -->

    <!-- Iconos de la app (Se generarán dinámicamente con JS para máxima compatibilidad iOS) -->
    <link id="apple-icon" rel="apple-touch-icon" href="">
    <link id="favicon" rel="icon" type="image/png" href="">
    
    <script>
        // Generador dinámico de Ícono en alta calidad (Soluciona problemas de SVG en iPad)
        (function() {
            const canvas = document.createElement('canvas');
            canvas.width = 512; canvas.height = 512;
            const ctx = canvas.getContext('2d');
            
            // Fondo Degradado (Estilo App Premium)
            const grad = ctx.createLinearGradient(0, 0, 512, 512);
            grad.addColorStop(0, '#ec4899'); // Rosa
            grad.addColorStop(0.5, '#8b5cf6'); // Morado
            grad.addColorStop(1, '#6366f1'); // Índigo
            ctx.fillStyle = grad; 
            // iOS requiere un cuadrado sólido, él recorta las esquinas automáticamente
            ctx.fillRect(0, 0, 512, 512); 
            
            // Círculos internos de cristal
            ctx.beginPath(); ctx.arc(256, 256, 180, 0, Math.PI*2); ctx.fillStyle = 'rgba(255,255,255,0.15)'; ctx.fill();
            ctx.beginPath(); ctx.arc(256, 256, 210, 0, Math.PI*2); ctx.strokeStyle = 'rgba(255,255,255,0.2)'; ctx.lineWidth = 8; ctx.stroke();
            
            // Emoji 🎧 con sombra paralela
            ctx.font = '240px "Apple Color Emoji", "Segoe UI Emoji", sans-serif'; 
            ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
            ctx.shadowColor = 'rgba(0,0,0,0.4)'; ctx.shadowBlur = 20; ctx.shadowOffsetY = 10;
            ctx.fillText('🎧', 256, 276); // Se desplaza ligeramente en Y por el diseño base
            
            // Convertir pintura a PNG y asignar globalmente
            window.appIconPNG = canvas.toDataURL('image/png');
            document.getElementById('apple-icon').href = window.appIconPNG;
            document.getElementById('favicon').href = window.appIconPNG;
        })();
    </script>

    <style>
        /* Deshabilitar selección de texto y zoom táctil para que se sienta como App nativa */
        body {
            -webkit-user-select: none;
            user-select: none;
            -webkit-touch-callout: none;
            overscroll-behavior-y: none;
            /* Soporte para el "notch" o bordes curvos del iPad */
            padding-top: env(safe-area-inset-top);
            padding-bottom: env(safe-area-inset-bottom);
            padding-left: env(safe-area-inset-left);
            padding-right: env(safe-area-inset-right);
        }

        /* Ocultar scrollbars pero mantener funcionalidad (añadido height 0px para scroll horizontal) */
        ::-webkit-scrollbar { width: 0px; height: 0px; background: transparent; }

        /* Animación de reproducción */
        @keyframes pulse-ring {
            0% { transform: scale(0.97); box-shadow: 0 0 0 0 rgba(255, 255, 255, 0.7); }
            70% { transform: scale(1.02); box-shadow: 0 0 0 15px rgba(255, 255, 255, 0); }
            100% { transform: scale(0.97); box-shadow: 0 0 0 0 rgba(255, 255, 255, 0); }
        }
        
        .reproduciendo {
            animation: pulse-ring 2s infinite;
            border: 4px solid white !important;
            filter: brightness(1.1);
            z-index: 10;
        }

        .tab-activa {
            background-color: white;
            color: #8b5cf6;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }
        
        .tab-inactiva {
            background-color: rgba(255, 255, 255, 0.2);
            color: white;
        }

        /* Efecto al tocar botones en iPad */
        article:active {
            transform: scale(0.95);
            transition: transform 0.1s;
        }
    </style>
</head>

            { archivo: "q", titulo: "¿Estrellita dónde estás?", interprete: "Super Simple", emoji: "⭐", color: "bg-yellow-300" },
            { archivo: "r", titulo: "El baile de la ensalada", interprete: "Plim Plim", emoji: "🥗", color: "bg-lime-500" }
        ];

        const sonidos = [
            { archivo: "s1", titulo: "Aplausos", interprete: "Efecto", emoji: "👏", color: "bg-emerald-400" },
            { archivo: "s2", titulo: "Risas", interprete: "Efecto", emoji: "😂", color: "bg-sky-400" },
            { archivo: "s3", titulo: "Redoble", interprete: "Tambor", emoji: "🥁", color: "bg-red-500" },
            { archivo: "s4", titulo: "Boing", interprete: "Efecto", emoji: "🪀", color: "bg-purple-500" },
            { archivo: "s5", titulo: "Magia", interprete: "Efecto", emoji: "✨", color: "bg-yellow-400" },
            { archivo: "s6", titulo: "Error", interprete: "Trombón", emoji: "🎺", color: "bg-orange-400" },
            { archivo: "s7", titulo: "Ta-da!", interprete: "Celebración", emoji: "🎉", color: "bg-pink-500" },
            { archivo: "s8", titulo: "Silbato", interprete: "Efecto", emoji: "😗", color: "bg-teal-400" }
        ];

        const videosDatos = [
            { archivo: "a", titulo: "Golden Live The Tonight Show" },
            { archivo: "b", titulo: "Golden Live A Year in TIME" },
            { archivo: "c", titulo: "Golden Live Jimmy Kimmel" },
            { archivo: "d", titulo: "Golden Live 2026 BAFTA Film Awards" },
            { archivo: "e", titulo: "Golden Live Dick Clark NYE 2026" }
        ];

        // --- CACHÉ DE ELEMENTOS DEL DOM ---
        const contenedorMusica = document.getElementById('grid-musica');
        const contenedorSonidos = document.getElementById('grid-sonidos');
        const contenedorVideos = document.getElementById('seccion-videos');
        const contenedorReproductor = document.getElementById('contenedor-reproductor');
        const listaVideosUI = document.getElementById('lista-videos');
        const reproductorVideo = document.getElementById('reproductor-video');
        const indicadorCargaVideo = document.getElementById('indicador-carga-video');
        const btnMusica = document.getElementById('btn-musica');
        const btnSonidos = document.getElementById('btn-sonidos');
        const btnVideos = document.getElementById('btn-videos');
        
        let temporizadorSimulador; // Para entorno de prueba
        let cancionActual = null; // Para detener la canción anterior

        // --- LÓGICA DE REPRODUCCIÓN ---
        const pararTodo = () => {
            document.querySelectorAll('audio').forEach(el => {
                el.pause();
                el.currentTime = 0;
            });

            // Detener y resetear video para que muestre la imagen poster
            reproductorVideo.pause();
            reproductorVideo.removeAttribute('src'); // Quitar fuente para forzar el póster
            reproductorVideo.load();
            indicadorCargaVideo.classList.add('hidden'); // Ocultar carga si se presionó parar

            document.querySelectorAll('article').forEach(el => el.classList.remove('reproduciendo'));
            cancionActual = null;
            clearTimeout(temporizadorSimulador);
        };

        const reproducir = (track, tipo) => {
            const audio = document.getElementById(`audio-${track.archivo}`);
            const articulo = document.getElementById(`btn-${track.archivo}`);
            if (!audio || !articulo) return;

            // Si es música, paramos otras músicas y el video actual
            if (tipo === 'musica') {
                if (cancionActual && cancionActual !== audio) {
                    cancionActual.pause();
                    cancionActual.currentTime = 0;
                }
                reproductorVideo.pause(); // Silenciar video si se toca música
                document.querySelectorAll('#seccion-musica article').forEach(el => el.classList.remove('reproduciendo'));
                cancionActual = audio;
            } else {
                // Si es un sonido, solo reseteamos su propia animación
                articulo.classList.remove('reproduciendo');
            }

            // Iniciar animación y audio
            articulo.classList.add('reproduciendo');
            audio.currentTime = 0;
            
            audio.play().catch(e => {
                console.warn("Sin audio real. Simulando...", e);
                // Simulación para el Preview de IA
                clearTimeout(temporizadorSimulador);
                temporizadorSimulador = setTimeout(() => {
                    articulo.classList.remove('reproduciendo');
                }, tipo === 'musica' ? 4000 : 1500); // 4s para música, 1.5s para SFX
            });
        };

        const reproducirVideo = (track) => {
            const articulo = document.getElementById(`btn-vid-${track.archivo}`);
            if (!articulo) return;

            // Detener música si está sonando
            if (cancionActual) {
                cancionActual.pause();
                cancionActual.currentTime = 0;
            }
            document.querySelectorAll('article').forEach(el => el.classList.remove('reproduciendo'));
            
            articulo.classList.add('reproduciendo');
            indicadorCargaVideo.classList.remove('hidden'); // Mostrar "Cargando..."

            // Configurar y reproducir video leyendo la carpeta "vid"
            reproductorVideo.src = `vid/${track.archivo}.mp4`;
            
            // Cuando el video tenga suficientes datos, ocultar el indicador
            reproductorVideo.oncanplay = () => {
                indicadorCargaVideo.classList.add('hidden');
            };

            reproductorVideo.play().catch(e => {
                console.warn("Sin video real en la carpeta local. Simulando...", e);
                clearTimeout(temporizadorSimulador);
                temporizadorSimulador = setTimeout(() => {
                    articulo.classList.remove('reproduciendo');
                    reproductorVideo.removeAttribute('src');
                    reproductorVideo.load();
                    indicadorCargaVideo.classList.add('hidden');
                }, 5000);
            });
            
            // Volver a la imagen inicial al terminar (Aun con loop, lo mantenemos por si acaso)
            reproductorVideo.onended = () => {
                articulo.classList.remove('reproduciendo');
                reproductorVideo.removeAttribute('src');
                reproductorVideo.load(); 
            };
        };

        // --- GENERACIÓN DE LA INTERFAZ ---
        const crearBotones = (arreglo, contenedor, tipo) => {
            arreglo.forEach((track) => {
                // Tarjeta
                const articulo = document.createElement('article');
                articulo.id = `btn-${track.archivo}`;
                // Estilo especial para iPad: cuadrados perfectos (aspect-square) y bordes gruesos
                articulo.className = `${track.color} rounded-3xl p-4 shadow-xl flex flex-col items-center justify-center aspect-square border-4 border-white/20 relative overflow-hidden transition-all`;
                articulo.innerHTML = `
                    <span class="text-6xl md:text-7xl mb-3 drop-shadow-md pointer-events-none">${track.emoji}</span>
                    <span class="text-sm md:text-base font-extrabold text-center leading-tight drop-shadow-md px-1 pointer-events-none">${track.titulo}</span>
                `;
                
                // Audio tag
                const audioEl = document.createElement('audio');
                audioEl.id = `audio-${track.archivo}`;
                // Prefijo según carpeta (ajusta según tu servidor)
                const rutaCarpeta = tipo === 'musica' ? 'audio/' : 'sonidos/';
                audioEl.src = `${rutaCarpeta}${track.archivo}.mp3`;
                audioEl.preload = 'auto'; // Forzamos al navegador a pre-cargar el archivo en memoria
                
                // Eventos
                articulo.addEventListener('click', () => reproducir(track, tipo));
                audioEl.addEventListener('ended', () => {
                    articulo.classList.remove('reproduciendo');
                });

                articulo.appendChild(audioEl);
                contenedor.appendChild(articulo);
            });
        };

        const crearBotonesVideos = () => {
            videosDatos.forEach((track) => {
                const articulo = document.createElement('article');
                articulo.id = `btn-vid-${track.archivo}`;
                // Formato Cinto: Elementos que no se encojen (flex-none), toman el alto total (h-full), y mantienen aspecto de video.
                articulo.className = `flex-none h-full aspect-video rounded-xl shadow-xl border-2 border-white/20 relative overflow-hidden transition-all cursor-pointer bg-cover bg-center bg-no-repeat bg-gray-800 snap-center`;
                
                // Asignamos la imagen de fondo apuntando a la carpeta img
                articulo.style.backgroundImage = `url('img/cover-vid-${track.archivo}.webp')`;
                
                // Limpiamos el texto y emoji, dejamos solo un overlay oscuro con un botón de play al pasar el dedo/mouse
                articulo.innerHTML = `
                    <div class="absolute inset-0 flex items-center justify-center opacity-0 hover:opacity-100 bg-black/40 transition-opacity pointer-events-none">
                        <span class="text-4xl md:text-5xl drop-shadow-lg">▶️</span>
                    </div>
                `;
                
                articulo.addEventListener('click', () => reproducirVideo(track));
                listaVideosUI.appendChild(articulo);
            });
        };

        const cambiarSeccion = (seccion) => {
            const seccionesConfig = [
                { id: 'musica', display: 'block' },
                { id: 'sonidos', display: 'block' },
                { id: 'videos', display: 'flex' }
            ];
            
            seccionesConfig.forEach(sec => {
                const cont = document.getElementById(`seccion-${sec.id}`);
                const btn = document.getElementById(`btn-${sec.id}`);
                
                if (sec.id === seccion) {
                    cont.classList.remove('hidden');
                    if (sec.display === 'flex') cont.classList.add('flex');
                    else cont.classList.add('block');
                    btn.className = "flex-1 py-2 md:py-3 text-lg md:text-xl font-bold rounded-xl transition-all tab-activa flex items-center justify-center gap-2";
                } else {
                    cont.classList.add('hidden');
                    if (sec.display === 'flex') cont.classList.remove('flex');
                    else cont.classList.remove('block');
                    btn.className = "flex-1 py-2 md:py-3 text-lg md:text-xl font-bold rounded-xl transition-all tab-inactiva flex items-center justify-center gap-2";
                }
            });
        };

        // Inicializar UI
        crearBotones(musica, contenedorMusica, 'musica');
        crearBotones(sonidos, contenedorSonidos, 'sonidos');
        crearBotonesVideos();

        // --- SISTEMA PWA EN UN SOLO ARCHIVO (MAGIA) ---
        // 1. Inyectar Manifest.json
        const pwaManifest = {
            "name": "DJ Emmy Reproductor",
            "short_name": "DJ Emmy",
            "start_url": ".",
            "display": "standalone",
            "background_color": "#8b5cf6",
            "theme_color": "#8b5cf6",
            "description": "Botonera musical infantil",
            "icons": [{
                "src": window.appIconPNG, // Usa la imagen PNG Premium generada arriba
                "sizes": "512x512",
                "type": "image/png",
                "purpose": "any maskable"
            }]
        };
        const blobManifest = new Blob([JSON.stringify(pwaManifest)], {type: 'application/json'});
        document.getElementById('manifest-link').href = URL.createObjectURL(blobManifest);

        // 2. Preparar lista de todos los archivos CON URLS ABSOLUTAS (Soluciona bug de iOS Blob)
        const baseHref = window.location.href.split('?')[0].replace(/index\.html$/, '');
        const makeAbsolute = (path) => new URL(path, baseHref).href;

        const urlsParaCachear = [
            makeAbsolute('./'),
            makeAbsolute('index.html')
        ];
        
        musica.forEach(t => urlsParaCachear.push(makeAbsolute(`audio/${t.archivo}.mp3`)));
        sonidos.forEach(t => urlsParaCachear.push(makeAbsolute(`sonidos/${t.archivo}.mp3`)));
        videosDatos.forEach(t => {
            urlsParaCachear.push(makeAbsolute(`vid/${t.archivo}.mp4`));
            urlsParaCachear.push(makeAbsolute(`img/cover-vid-${t.archivo}.webp`));
        });

        // NUEVO: Función para limpiar caché completamente y recargar
        const borrarCacheYRecargar = async () => {
            const iconoBtn = document.getElementById('icono-actualizar');
            if(iconoBtn) iconoBtn.innerText = "⏳";
            
            try {
                // 1. Borrar todas las cachés guardadas
                if ('caches' in window) {
                    const keys = await caches.keys();
                    await Promise.all(keys.map(key => caches.delete(key)));
                }
                
                // 2. Desregistrar el Service Worker para forzar la actualización
                if ('serviceWorker' in navigator) {
                    const registrations = await navigator.serviceWorker.getRegistrations();
                    for (let registration of registrations) {
                        await registration.unregister();
                    }
                }
                
                // 3. Recargar la página desde cero
                window.location.reload();
            } catch (error) {
                console.error("Error al limpiar caché:", error);
                window.location.reload(); // Recargar de todos modos si falla
            }
        };

        // 2.5 Lógica del botón para Forzar Descarga Manualmente con Barra de Progreso
        const CACHE_NAME = 'djemmy-cache-v9'; // VERSIÓN 9
        
        const iniciarDescargaOffline = async () => {
            const modal = document.getElementById('modal-descarga');
            const barra = document.getElementById('barra-progreso');
            const texto = document.getElementById('texto-progreso');
            const btnCerrar = document.getElementById('btn-cerrar-descarga');
            
            modal.classList.replace('hidden', 'flex');
            btnCerrar.classList.add('hidden');
            barra.style.width = '0%';
            barra.classList.remove('bg-red-500');
            barra.classList.add('from-blue-400', 'to-indigo-500');
            
            try {
                const cache = await caches.open(CACHE_NAME);
                let completados = 0;
                const total = urlsParaCachear.length;
                
                texto.innerText = `Calculando...`;
                
                // Descargar uno por uno para poder animar la barra de progreso
                for(let i = 0; i < total; i++) {
                    const url = urlsParaCachear[i];
                    try {
                        // Verificamos si ya está guardado para no descargar doble
                        const respuestaCache = await cache.match(url);
                        if(!respuestaCache) {
                            const respuestaRed = await fetch(url, { cache: 'no-store' });
                            if(respuestaRed.ok) {
                                await cache.put(url, respuestaRed);
                            } else {
                                console.warn('Archivo omitido (404):', url);
                            }
                        }
                    } catch(e) {
                        console.warn('Fallo de red al descargar:', url, e);
                    }
                    completados++;
                    const porcentaje = Math.round((completados / total) * 100);
                    barra.style.width = `${porcentaje}%`;
                    texto.innerText = `${completados} de ${total} guardados`;
                }
                
                // Cambiar estilo a éxito
                barra.classList.remove('from-blue-400', 'to-indigo-500');
                barra.classList.add('bg-green-500');
                texto.innerText = "¡Todo descargado con éxito! ✅";
                btnCerrar.classList.remove('hidden');
                
            } catch(error) {
                console.error("Error crítico en descarga manual:", error);
                barra.classList.remove('from-blue-400', 'to-indigo-500');
                barra.classList.add('bg-red-500');
                texto.innerText = "Error de conexión. Intenta de nuevo. ❌";
                btnCerrar.classList.remove('hidden');
            }
        };

        // 3. Inyectar Service Worker para uso Fuera de Línea
        const swCodigo = `
            const CACHE_NAME_SW = '${CACHE_NAME}'; 
            const urlsToCache = ${JSON.stringify(urlsParaCachear)};

            self.addEventListener('install', (event) => {
                self.skipWaiting();
                // Sigue instalando en segundo plano, pero con URLs absolutas arregladas
                event.waitUntil(
                    caches.open(CACHE_NAME_SW).then((cache) => {
                        return Promise.all(
                            urlsToCache.map(url => {
                                return cache.add(url).catch(err => console.warn('Ignorado en background:', url));
                            })
                        );
                    })
                );
            });

            // Evento Activate para limpiar cachés antiguas
            self.addEventListener('activate', (event) => {
                event.waitUntil(
                    caches.keys().then((cacheNames) => {
                        return Promise.all(
                            cacheNames.map((cacheName) => {
                                if (cacheName !== CACHE_NAME_SW) {
                                    console.log('Borrando caché antigua:', cacheName);
                                    return caches.delete(cacheName);
                                }
                            })
                        );
                    }).then(() => self.clients.claim()) 
                );
            });

            self.addEventListener('fetch', (event) => {
                // Solo interceptar peticiones GET
                if (event.request.method !== 'GET') return;
                
                event.respondWith(
                    caches.match(event.request).then((cachedResponse) => {
                        if (cachedResponse) {
                            return cachedResponse; // Devolver desde caché instantáneamente
                        }
                        // Intento de red
                        return fetch(event.request).then((networkResponse) => {
                            return caches.open(CACHE_NAME_SW).then((cache) => {
                                cache.put(event.request, networkResponse.clone());
                                return networkResponse;
                            });
                        });
                    }).catch(() => new Response('Contenido no disponible offline'))
                );
            });
        `;
        const blobSW = new Blob([swCodigo], {type: 'application/javascript'});
        const urlSW = URL.createObjectURL(blobSW);

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                // Registramos el Service Worker simplificado sin los indicadores visuales
                navigator.serviceWorker.register(urlSW, { scope: './' }).then(reg => {
                    console.log('Service Worker registrado correctamente.', reg.scope);
                }).catch(err => {
                    console.log('Error en Service Worker', err);
                });
            });
        }

        // 4. Detectar iPadOS/iOS para mostrar prompt de instalación
        const esIos = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;
        const enModoStandalone = window.navigator.standalone === true || window.matchMedia('(display-mode: standalone)').matches;
        
        if (esIos && !enModoStandalone) {
            // Mostrar mensajito de cómo instalar en el iPad después de 2 segundos
            setTimeout(() => {
                const prompt = document.getElementById('pwa-prompt');
                prompt.classList.remove('hidden');
                prompt.classList.add('flex');
            }, 2000);
        }
    </script>
</body>
