        videoKeepAwake.setAttribute('loop', '');
        videoKeepAwake.setAttribute('playsinline', '');
        videoKeepAwake.setAttribute('muted', '');
        videoKeepAwake.style.cssText = 'position:fixed;width:1px;height:1px;opacity:0;pointer-events:none;top:0;left:0;';
        videoKeepAwake.src = 'data:video/mp4;base64,AAAAIGZ0eXBpc29tAAACAGlzb21pc28yYXZjMW1wNDEAAAAIZnJlZQAAAs1tZGF0AAACrgYF//+q3EXpvebZSLeWLNgg2SPu73gyNjQgLSBjb3JlIDE1MiByMjg1NCBlOWE1OTAzIC0gSC4yNjQvTVBFRy00IEFWQyBjb2RlYyAtIENvcHlsZWZ0IDIwMDMtMjAxNyAtIGh0dHA6Ly93d3cudmlkZW9sYW4ub3JnL3gyNjQuaHRtbCAtIG9wdGlvbnM6IGNhYmFjPTEgcmVmPTMgZGVibG9jaz0xOjA6MCBhbmFseXNlPTB4MzoweDExMyBtZT1oZXggc3VibWU9NyBwc3k9MSBwc3lfcmQ9MS4wMDowLjAwIG1peGVkX3JlZj0xIG1lX3JhbmdlPTE2IGNocm9tYV9tZT0xIHRyZWxsaXM9MSA4eDhkY3Q9MSBjcW09MCBkZWFkem9uZT0yMSwxMSBmYXN0X3Bza2lwPTEgY2hyb21hX3FwX29mZnNldD0tMiB0aHJlYWRzPTMgbG9va2FoZWFkX3RocmVhZHM9MSBzbGljZWRfdGhyZWFkcz0wIG5yPTAgZGVjaW1hdGU9MSBpbnRlcmxhY2VkPTAgYmx1cmF5X2NvbXBhdD0wIGNvbnN0cmFpbmVkX2ludHJhPTAgYmZyYW1lcz0zIGJfcHlyYW1pZD0yIGJfYWRhcHQ9MSBiX2JpYXM9MCBkaXJlY3Q9MSB3ZWlnaHRiPTEgb3Blbl9nb3A9MCB3ZWlnaHRwPTIga2V5aW50PTI1MCBrZXlpbnRfbWluPTI1IHNjZW5lY3V0PTQwIGludHJhX3JlZnJlc2g9MCByY19sb29rYWhlYWQ9NDAgcmM9Y3JmIG1idHJlZT0xIGNyZj0yMy4wIHFjb21wPTAuNjAgcXBtaW49MCBxcG1heD02OSBxcHN0ZXA9NCBpcF9yYXRpbz0xLjQwIGFxPTE6MS4wMACAAAAPZWxpYnggAAAHAm////+B';
        document.body.appendChild(videoKeepAwake);

        /**
         * Activa el Wake Lock usando la API nativa o el fallback de video.
         * La API nativa se auto-reactiva si el sistema la libera (ej. al minimizar la app).
         */
        const activarWakeLock = async () => {
            // Intento 1: Screen Wake Lock API (nativa, más limpia)
            if ('wakeLock' in navigator) {
                try {
                    wakeLock = await navigator.wakeLock.request('screen');
                    console.log('💡 Wake Lock activo (API nativa).');
                    // Si el sistema libera el lock (ej. al cambiar de app), reactivarlo al volver
                    wakeLock.addEventListener('release', () => {
                        console.log('💤 Wake Lock liberado por el sistema.');
                        if (document.visibilityState === 'visible') activarWakeLock();
                    });
                    return; // Éxito — no necesitamos el fallback
                } catch (e) {
                    console.warn('Wake Lock API no disponible, activando fallback de video:', e);
                }
            }
            // Intento 2: Video silencioso en loop (fallback universal para iOS)
            videoKeepAwake.play().catch(() => {
                console.warn('⚠️ Fallback de Wake Lock también falló.');
            });
        };

        // Activar al primer gesto del usuario (requerimiento de iOS para media y Wake Lock)
        document.addEventListener('click',      () => activarWakeLock(), { once: true });
        document.addEventListener('touchstart', () => activarWakeLock(), { once: true });

        // Reactivar el Wake Lock si el usuario vuelve a la app después de minimizarla
        document.addEventListener('visibilitychange', () => {
            if (document.visibilityState === 'visible') activarWakeLock();
        });


        /* ═══════════════════════════════════════════════════════════════════
           § 16. BLOQUEO DE RUBBER-BAND SCROLL (iPadOS standalone)

           En modo "Agregar a Inicio", Safari en iPadOS permite que el
           viewport completo rebote verticalmente aunque el body tenga
           overflow:hidden. Esto ocurre porque el motor WebKit aplica el
           rubber-band al "documento" antes de que los estilos CSS puedan
           bloquearlo.

           SOLUCIÓN en tres capas (implementadas en conjunto):
             1. CSS: html+body con position:fixed + overflow:hidden (arriba)
             2. CSS: clase .scroll-nativo en contenedores con scroll legítimo
             3. JS:  touchmove bloqueado a nivel document, con excepción para
                     elementos cuyo scroll aún no ha llegado al extremo.

           Esta función detecta si el gesto táctil ocurre dentro de un
           contenedor que tiene scroll disponible en esa dirección, y solo
           en ese caso deja pasar el evento. En cualquier otro caso lo
           cancela antes de que WebKit pueda aplicar el rubber-band.
           ═══════════════════════════════════════════════════════════════════ */

        /**
         * Recorre los ancestros del elemento tocado buscando uno que tenga
         * scroll disponible en la dirección del gesto.
         * @param {HTMLElement} el Elemento donde comenzó el toque
         * @param {number}      dy Delta Y: positivo = gesto hacia arriba (scroll down)
         * @returns {boolean} true si algún ancestro puede absorber el scroll
         */
        const puedeScrollear = (el, dy) => {
            while (el && el !== document.body) {
                const overflow = window.getComputedStyle(el).overflowY;
                if (overflow === 'auto' || overflow === 'scroll') {
                    const atTop    = el.scrollTop <= 0;
                    const atBottom = el.scrollTop + el.clientHeight >= el.scrollHeight - 1;
                    if (!(atTop && dy > 0) && !(atBottom && dy < 0)) return true;
                }
                el = el.parentElement;
            }
            return false;
        };

        let _touchStartY = 0;

        // Registrar posición Y al inicio de cada gesto táctil
        document.addEventListener('touchstart', (e) => {
            _touchStartY = e.touches[0].clientY;
        }, { passive: true });

        // Bloquear touchmove cuando no hay scroll legítimo en esa dirección
        // passive:false es obligatorio para poder llamar a preventDefault()
        document.addEventListener('touchmove', (e) => {
            // Permitir siempre el scroll horizontal (para carruseles, etc.)
            if (e.touches.length > 1) return; // Gestos de pellizco: no bloquear
            const dy = _touchStartY - e.touches[0].clientY;
            if (!puedeScrollear(e.target, dy)) {
                e.preventDefault();
            }
        }, { passive: false });

    </script>
</body>
