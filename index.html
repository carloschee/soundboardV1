<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <!-- Meta tags específicos para iPadOS y PWA -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="DJ Emmy">
    <meta name="theme-color" content="#8b5cf6">
    
    <title>DJ Emmy - Reproductor Infantil</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Link al manifest dinámico (se llenará con JS) -->
    <link id="manifest-link" rel="manifest" href="">
    
    <!-- Iconos de la app (Se generarán dinámicamente con JS para máxima compatibilidad iOS) -->
    <link id="apple-icon" rel="apple-touch-icon" href="">
    <link id="favicon" rel="icon" type="image/png" href="">
    
    <script>
        // Generador dinámico de Ícono en alta calidad (Soluciona problemas de SVG en iPad)
        (function() {
            const canvas = document.createElement('canvas');
            canvas.width = 512; canvas.height = 512;
            const ctx = canvas.getContext('2d');
            
            // Fondo Degradado (Estilo App Premium)
            const grad = ctx.createLinearGradient(0, 0, 512, 512);
            grad.addColorStop(0, '#ec4899'); // Rosa
            grad.addColorStop(0.5, '#8b5cf6'); // Morado
            grad.addColorStop(1, '#6366f1'); // Índigo
            ctx.fillStyle = grad; 
            // iOS requiere un cuadrado sólido, él recorta las esquinas automáticamente
            ctx.fillRect(0, 0, 512, 512); 
            
            // Círculos internos de cristal
            ctx.beginPath(); ctx.arc(256, 256, 180, 0, Math.PI*2); ctx.fillStyle = 'rgba(255,255,255,0.15)'; ctx.fill();
            ctx.beginPath(); ctx.arc(256, 256, 210, 0, Math.PI*2); ctx.strokeStyle = 'rgba(255,255,255,0.2)'; ctx.lineWidth = 8; ctx.stroke();
            
            // Emoji 🎧 con sombra paralela
            ctx.font = '240px "Apple Color Emoji", "Segoe UI Emoji", sans-serif'; 
            ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
            ctx.shadowColor = 'rgba(0,0,0,0.4)'; ctx.shadowBlur = 20; ctx.shadowOffsetY = 10;
            ctx.fillText('🎧', 256, 276); // Se desplaza ligeramente en Y por el diseño base
            
            // Convertir pintura a PNG y asignar globalmente
            window.appIconPNG = canvas.toDataURL('image/png');
            document.getElementById('apple-icon').href = window.appIconPNG;
            document.getElementById('favicon').href = window.appIconPNG;
        })();
    </script>

    <style>
        /* Deshabilitar selección de texto y zoom táctil para que se sienta como App nativa */
        body {
            -webkit-user-select: none;
            user-select: none;
            -webkit-touch-callout: none;
            overscroll-behavior-y: none;
            /* Soporte para el "notch" o bordes curvos del iPad */
            padding-top: env(safe-area-inset-top);
            padding-bottom: env(safe-area-inset-bottom);
            padding-left: env(safe-area-inset-left);
            padding-right: env(safe-area-inset-right);
        }

        /* Ocultar scrollbars pero mantener funcionalidad (añadido height 0px para scroll horizontal) */
        ::-webkit-scrollbar { width: 0px; height: 0px; background: transparent; }

        /* Animación de reproducción */
        @keyframes pulse-ring {
            0% { transform: scale(0.97); box-shadow: 0 0 0 0 rgba(255, 255, 255, 0.7); }
            70% { transform: scale(1.02); box-shadow: 0 0 0 15px rgba(255, 255, 255, 0); }
            100% { transform: scale(0.97); box-shadow: 0 0 0 0 rgba(255, 255, 255, 0); }
        }
        
        .reproduciendo {
            animation: pulse-ring 2s infinite;
            border: 4px solid white !important;
            filter: brightness(1.1);
            z-index: 10;
        }

        .tab-activa {
            background-color: white;
            color: #8b5cf6;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }
        
        .tab-inactiva {
            background-color: rgba(255, 255, 255, 0.2);
            color: white;
        }

        /* Animaciones Memorama */
        .perspective-1000 { perspective: 1000px; }
        .transform-style-3d { transform-style: preserve-3d; }
        .backface-hidden { backface-visibility: hidden; -webkit-backface-visibility: hidden; }
        .rotate-y-180 { transform: rotateY(180deg); }
        .tarjeta-memorama { transition: transform 0.55s cubic-bezier(0.4, 0.2, 0.2, 1), opacity 0.5s ease; }

        /* Cara trasera: patrón de carta clásica */
        .carta-dorso {
            background-color: #1a237e;
            background-image:
                repeating-linear-gradient(
                    45deg,
                    rgba(255,255,255,0.04) 0px,
                    rgba(255,255,255,0.04) 1px,
                    transparent 1px,
                    transparent 8px
                ),
                repeating-linear-gradient(
                    -45deg,
                    rgba(255,255,255,0.04) 0px,
                    rgba(255,255,255,0.04) 1px,
                    transparent 1px,
                    transparent 8px
                );
            border: 3px solid #283593;
            box-shadow: inset 0 0 0 4px rgba(255,255,255,0.08), 0 4px 16px rgba(0,0,0,0.4);
        }
        .carta-dorso::after {
            content: '🎴';
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: clamp(1.4rem, 3vw, 2.2rem);
            opacity: 0.35;
        }
        /* Marco interior del dorso */
        .carta-dorso-marco {
            position: absolute;
            inset: 5px;
            border: 1.5px solid rgba(255,255,255,0.15);
            border-radius: 8px;
            pointer-events: none;
        }

        /* Cara delantera: carta blanca con marco decorativo */
        .carta-frente {
            background: linear-gradient(145deg, #fffef7 0%, #faf8ee 100%);
            border: 2px solid #e0d9c8;
            box-shadow: inset 0 0 0 3px rgba(0,0,0,0.04), 0 4px 16px rgba(0,0,0,0.3);
        }
        .carta-frente-marco {
            position: absolute;
            inset: 5px;
            border: 1.5px solid rgba(180,160,100,0.35);
            border-radius: 8px;
            pointer-events: none;
        }
        /* Número en esquinas estilo baraja */
        .carta-corner {
            position: absolute;
            font-size: clamp(0.5rem, 1.2vw, 0.75rem);
            font-weight: 900;
            color: #c0392b;
            line-height: 1;
            pointer-events: none;
        }

        /* Animación Confeti y Pila */
        @keyframes pop-in {
            0% { transform: scale(0); }
            80% { transform: scale(1.2); }
            100% { transform: scale(1); }
        }
        .anim-pop { animation: pop-in 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }

        /* Efecto al tocar botones en iPad */
        article:active {
            transform: scale(0.95);
            transition: transform 0.1s;
        }
    </style>
</head>

    <script>
        // --- BASE DE DATOS DE PISTAS (cargada desde JSON externo) ---
        let musica = [];
        let videosDatos = [];

        // --- DATOS DEL JUEGO MEMORAMA ---
        const frutasMemorama = ['🍇','🍉','🍊','🍌','🍍','🍎','🍐','🍋','🍑','🍒','🍓','🥝'];
        let cartasJuego = [];
        let cartasVolteadas = [];
        let parejasEncontradas = 0;
        let memoramaBloqueado = false;

        // --- SISTEMA DE SONIDOS SINTÉTICOS (Para Memorama, no requiere descargas) ---
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        let audioCtx;

        const initAudio = () => {
            if (!audioCtx) audioCtx = new AudioContext();
            if (audioCtx.state === 'suspended') audioCtx.resume();
        };

        const playTone = (freq, type, duration, vol=0.1) => {
            initAudio();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = type;
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            gain.gain.setValueAtTime(vol, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + duration);
        };

        const sonidoFlip = () => playTone(300, 'triangle', 0.05, 0.02);
        const sonidoExito = () => {
            playTone(523.25, 'sine', 0.1, 0.1); // Do
            setTimeout(() => playTone(659.25, 'sine', 0.2, 0.1), 100); // Mi
        };
        const sonidoError = () => {
            playTone(200, 'sawtooth', 0.1, 0.05);
            setTimeout(() => playTone(150, 'sawtooth', 0.2, 0.05), 100);
        };
        const sonidoVictoria = () => {
            [523.25, 659.25, 783.99, 1046.50].forEach((f, i) => setTimeout(() => playTone(f, 'sine', 0.3, 0.1), i * 150));
        };

        // --- EFECTO DE CONFETI ---
        const lanzarConfeti = () => {
            const colores = ['#fce18a', '#ff726d', '#b48def', '#f4306d', '#42c062', '#3b82f6', '#fbbf24'];
            for (let i = 0; i < 80; i++) {
                const confeti = document.createElement('div');
                confeti.className = 'absolute w-3 h-3 md:w-4 md:h-4 rounded-sm z-50 pointer-events-none';
                confeti.style.backgroundColor = colores[Math.floor(Math.random() * colores.length)];
                confeti.style.left = Math.random() * 100 + 'vw';
                confeti.style.top = '-20px';
                document.body.appendChild(confeti);
                
                const duracion = Math.random() * 3 + 2;
                const delay = Math.random() * 0.2;
                
                confeti.animate([
                    { transform: `translate3d(0,0,0) rotate(0deg)`, opacity: 1 },
                    { transform: `translate3d(${Math.random()*300 - 150}px, 100vh, 0) rotate(${Math.random()*720}deg)`, opacity: 0 }
                ], {
                    duration: duracion * 1000,
                    delay: delay * 1000,
                    easing: 'cubic-bezier(.37,0,.63,1)',
                    fill: 'forwards'
                });
                
                setTimeout(() => confeti.remove(), (duracion + delay) * 1000);
            }
        };

        // --- CACHÉ DE ELEMENTOS DEL DOM ---
        const contenedorMusica = document.getElementById('grid-musica');
        const contenedorVideos = document.getElementById('seccion-videos');
        const contenedorReproductor = document.getElementById('contenedor-reproductor');
        const listaVideosUI = document.getElementById('lista-videos');
        const reproductorVideo = document.getElementById('reproductor-video');
        const indicadorCargaVideo = document.getElementById('indicador-carga-video');
        
        let temporizadorSimulador; // Para entorno de prueba
        let cancionActual = null; // Para detener la canción anterior

        // --- LÓGICA DE REPRODUCCIÓN ---
        const pararTodo = () => {
            document.querySelectorAll('audio').forEach(el => {
                el.pause();
                el.currentTime = 0;
            });

            // Detener y resetear video para que muestre la imagen poster
            reproductorVideo.pause();
            if (reproductorVideo._blobUrl) {
                URL.revokeObjectURL(reproductorVideo._blobUrl);
                reproductorVideo._blobUrl = null;
            }
            reproductorVideo.removeAttribute('src');
            reproductorVideo.load();
            indicadorCargaVideo.classList.add('hidden'); // Ocultar carga si se presionó parar

            document.querySelectorAll('article').forEach(el => el.classList.remove('reproduciendo'));
            cancionActual = null;
            clearTimeout(temporizadorSimulador);
        };

        const reproducir = (track, tipo) => {
            const audio = document.getElementById(`audio-${track.archivo}`);
            const articulo = document.getElementById(`btn-${track.archivo}`);
            if (!audio || !articulo) return;

            // Si es música, paramos otras músicas y el video actual
            if (tipo === 'musica') {
                if (cancionActual && cancionActual !== audio) {
                    cancionActual.pause();
                    cancionActual.currentTime = 0;
                }
                reproductorVideo.pause(); // Silenciar video si se toca música
                document.querySelectorAll('#seccion-musica article').forEach(el => el.classList.remove('reproduciendo'));
                cancionActual = audio;
            } else {
                // Si es un sonido, solo reseteamos su propia animación
                articulo.classList.remove('reproduciendo');
            }

            // Iniciar animación y audio
            articulo.classList.add('reproduciendo');
            audio.currentTime = 0;
            
            audio.play().catch(e => {
                console.warn("Sin audio real. Simulando...", e);
                // Simulación para el Preview de IA
                clearTimeout(temporizadorSimulador);
                temporizadorSimulador = setTimeout(() => {
                    articulo.classList.remove('reproduciendo');
                }, tipo === 'musica' ? 4000 : 1500); // 4s para música, 1.5s para SFX
            });
        };

        const reproducirVideo = async (track) => {
            const articulo = document.getElementById(`btn-vid-${track.archivo}`);
            if (!articulo) return;

            if (cancionActual) {
                cancionActual.pause();

        // --- SISTEMA PWA EN UN SOLO ARCHIVO (MAGIA) ---

        // 3. Inyectar Service Worker para uso Fuera de Línea
        const swCodigo = `
            const CACHE_NAME_SW = '${CACHE_NAME}'; 
            const urlsToCache = ${JSON.stringify(urlsParaCachear)};

            self.addEventListener('install', (event) => {
                self.skipWaiting();
                event.waitUntil(
                    caches.open(CACHE_NAME_SW).then((cache) => {
                        return Promise.all(
                            urlsToCache.map(url => {
                                return cache.add(url).catch(err => console.warn('Ignorado en background:', url));
                            })
                        );
                    })
                );
            });

                event.waitUntil(
                    caches.keys().then((cacheNames) => {
                        return Promise.all(
                            cacheNames.map((cacheName) => {
                                if (cacheName !== CACHE_NAME_SW) {
                                    return caches.delete(cacheName);
                                }
                            })
                        );
                    }).then(() => self.clients.claim())

                            const bytes = /bytes=(\\d+)-(\\d*)/.exec(rangeHeader);
                            const start = parseInt(bytes[1]);
                            const end   = bytes[2] ? parseInt(bytes[2]) : blob.size - 1;

                                    'Content-Range': \`bytes \${start}-\${end}/\${blob.size}\`,

                                }

                    );

                                cache.put(event.request, networkResponse.clone());
                                return networkResponse;
                            });
                        });
                    }).catch(() => new Response('Contenido no disponible offline'))
                );
            });
